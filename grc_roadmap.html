<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GRC Beginner Roadmap — @cyber_crookz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --grn: #00FF88;
    --cyn: #00D4FF;
    --ylw: #FFD700;
    --red: #FF3E3E;
    --bg:  #0A0A0F;
    --card:#0D1117;
    --border:#1E2A38;
    --gray:#888;
  }

  body {
    background: var(--bg);
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    padding: 28px 16px 48px;
    position: relative;
    overflow-x: hidden;
  }

  /* grid bg */
  body::before {
    content:'';
    position:fixed; inset:0; z-index:0;
    background-image:
      linear-gradient(rgba(0,255,136,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none;
  }

  .wrap { position:relative; z-index:1; max-width:620px; margin:0 auto; }

  /* ── HEADER ── */
  .header { text-align:center; margin-bottom:36px; }
  .handle {
    font-size:11px; letter-spacing:4px; color:var(--cyn);
    margin-bottom:8px;
  }
  .title {
    font-family:'Orbitron', monospace;
    font-size:clamp(20px,5vw,34px); font-weight:900;
    background:linear-gradient(90deg,var(--grn),var(--cyn));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    letter-spacing:2px; line-height:1.2;
  }
  .subtitle { font-size:11px; color:var(--gray); margin-top:8px; }

  /* ── GRC PILLS ── */
  .pills {
    display:flex; gap:8px; justify-content:center;
    flex-wrap:wrap; margin:20px 0 32px;
  }
  .pill {
    padding:6px 16px; border-radius:20px; font-size:11px; font-weight:700;
    letter-spacing:1px;
  }
  .pill.g { background:#00FF8818; border:1px solid var(--grn); color:var(--grn); }
  .pill.r { background:#FFD70018; border:1px solid var(--ylw); color:var(--ylw); }
  .pill.c { background:#00D4FF18; border:1px solid var(--cyn); color:var(--cyn); }

  /* ── PHASE CARD ── */
  .phase-wrap { display:flex; flex-direction:column; align-items:center; }

  .phase-card {
    width:100%; border-radius:12px;
    background:var(--card);
    border:2px solid var(--border);
    padding:16px 18px;
    display:flex; align-items:center; gap:14px;
    cursor:pointer;
    transition: border-color .25s, box-shadow .25s;
    user-select:none;
  }
  .phase-card:hover { border-color: var(--accent); }
  .phase-card.open  {
    border-color: var(--accent);
    box-shadow: var(--glow);
    border-radius:12px 12px 0 0;
  }

  .badge {
    width:48px; height:48px; flex-shrink:0; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Orbitron',monospace; font-size:11px; font-weight:900;
    border:2px solid var(--accent); color:var(--accent);
    background:color-mix(in srgb, var(--accent) 12%, transparent);
  }
  .phase-info { flex:1; min-width:0; }
  .phase-name { font-size:14px; font-weight:700; color:#fff; margin-bottom:3px; }
  .phase-dur  { font-size:10px; color:var(--gray); }

  .cert-tag {
    font-size:9px; color:var(--accent);
    background:color-mix(in srgb, var(--accent) 10%, transparent);
    border:1px solid color-mix(in srgb, var(--accent) 35%, transparent);
    border-radius:6px; padding:4px 9px; text-align:center;
    max-width:120px; line-height:1.4; flex-shrink:0;
  }

  .chevron {
    color:var(--accent); font-size:14px; flex-shrink:0;
    transition: transform .25s;
  }
  .open .chevron { transform: rotate(180deg); }

  /* ── DETAIL PANEL ── */
  .detail {
    width:100%;
    background:#080D12;
    border:2px solid var(--accent);
    border-top:none;
    border-radius:0 0 12px 12px;
    padding:16px 18px;
    display:none;
  }
  .detail.open { display:block; }

  .detail-label {
    font-size:9px; letter-spacing:2px; font-weight:700;
    margin-bottom:8px; color:var(--accent);
  }

  .topics { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
  .topic {
    font-size:9.5px; color:#ccc;
    background:#111827; border:1px solid #2A3A4A;
    border-radius:6px; padding:4px 10px;
  }

  .res-list { display:flex; flex-direction:column; gap:5px; }
  .res-link {
    display:flex; align-items:center; gap:8px;
    padding:7px 12px; border-radius:7px;
    background:#0F1923; border:1px solid #1A2A1A;
    text-decoration:none; font-size:10px; color:var(--grn);
    transition: border-color .2s;
  }
  .res-link:hover { border-color:#00FF8877; }
  .res-link span { flex:1; }
  .res-link small { color:#444; font-size:9px; }

  /* ── CONNECTOR ── */
  .connector {
    display:flex; flex-direction:column; align-items:center;
    margin:6px 0;
  }
  .conn-line { width:2px; height:18px; background:#1E2A38; }
  .conn-arrow {
    width:0; height:0;
    border-left:7px solid transparent;
    border-right:7px solid transparent;
    border-top:10px solid rgba(0,255,136,.35);
  }

  /* ── DESTINATION ── */
  .destination {
    width:100%; margin-top:18px;
    background:linear-gradient(135deg,#001A0D,#0A1628);
    border:2px solid var(--grn);
    border-radius:12px; padding:20px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,255,136,.2);
  }
  .dest-icon { font-size:26px; margin-bottom:8px; }
  .dest-title {
    font-family:'Orbitron',monospace;
    font-size:14px; font-weight:900;
    color:var(--grn); letter-spacing:2px;
  }
  .dest-sub { font-size:10px; color:var(--gray); margin-top:6px; }

  /* ── FOOTER ── */
  .footer { text-align:center; margin-top:32px; font-size:10px; color:#333; }
  .footer span { color:var(--grn); }

  /* ── RESPONSIVE ── */
  @media(max-width:480px){
    .cert-tag { display:none; }
    .phase-name { font-size:13px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="header">
    <div class="handle">@cyber_crookz</div>
    <div class="title">GRC BEGINNER ROADMAP</div>
    <div class="subtitle">Your zero-to-job-ready guide for Cybersecurity GRC</div>
  </div>

  <div class="pills">
    <div class="pill g">⚙️ Governance</div>
    <div class="pill r">⚠️ Risk</div>
    <div class="pill c">✅ Compliance</div>
  </div>

  <!-- PHASES -->
  <div id="roadmap"></div>

  <!-- DESTINATION -->
  <div class="destination">
    <div class="dest-icon">🎯</div>
    <div class="dest-title">GRC ANALYST — JOB READY</div>
    <div class="dest-sub">~6 months · Compliance · Risk · Audit · Privacy</div>
  </div>

  <div class="footer">Made for <span>@cyber_crookz</span> · GRC Reels Series · Free to share ⭐</div>
</div>

<script>
const phases = [
  {
    num:"01", icon:"🖥️", label:"IT & Security Basics",
    duration:"4–6 Weeks", cert:"Google IT / ITF+",
    color:"#00FF88", glow:"0 0 22px rgba(0,255,136,.35)",
    topics:["OSI Model & Networking","Windows & Linux Basics","CIA Triad & Encryption",
            "Cloud Shared Responsibility","Firewalls & VPNs"],
    resources:[
      {name:"Professor Messer (Free Video Courses)",     url:"https://www.professormesser.com"},
      {name:"TryHackMe — Pre-Security Path",             url:"https://tryhackme.com/path/outline/presecurity"},
      {name:"Cybrary Free Courses",                      url:"https://www.cybrary.it"},
      {name:"Khan Academy — Internet 101",               url:"https://www.khanacademy.org/computing/computers-and-internet"},
      {name:"NIST Glossary of Key Terms",                url:"https://csrc.nist.gov/glossary"},
    ]
  },
  {
    num:"02", icon:"📋", label:"GRC Frameworks & Standards",
    duration:"6–8 Weeks", cert:"ISC2 CC (FREE) / Security+",
    color:"#00D4FF", glow:"0 0 22px rgba(0,212,255,.35)",
    topics:["NIST CSF 2.0","NIST SP 800-53","ISO 27001 / 27002",
            "SOC 2 · PCI-DSS · HIPAA","GDPR Basics","FedRAMP Overview"],
    resources:[
      {name:"NIST CSF 2.0 — Free PDF",                  url:"https://nvlpubs.nist.gov/nistpubs/CSWP/NIST.CSWP.29.pdf"},
      {name:"NIST SP 800-53 Rev5 — Free PDF",            url:"https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-53r5.pdf"},
      {name:"ISC2 CC Free Course (Coursera)",            url:"https://www.coursera.org/learn/isc2-systems-and-network-security"},
      {name:"CSA Cloud Controls Matrix (Free)",          url:"https://cloudsecurityalliance.org/research/cloud-controls-matrix"},
      {name:"HIPAA.gov — Free Training Materials",       url:"https://www.hhs.gov/hipaa/for-professionals/training/index.html"},
      {name:"GDPR Full Text (EUR-Lex)",                  url:"https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32016R0679"},
    ]
  },
  {
    num:"03", icon:"⚠️", label:"Risk Management",
    duration:"4–6 Weeks", cert:"CRISC (Advanced Goal)",
    color:"#FFD700", glow:"0 0 22px rgba(255,215,0,.3)",
    topics:["Risk Identification & Assessment","Qualitative vs Quantitative (ALE = ARO × SLE)",
            "FAIR Model","Risk Register","Third-Party Risk (TPRM)"],
    resources:[
      {name:"NIST SP 800-30 Risk Guide — Free PDF",      url:"https://nvlpubs.nist.gov/nistpubs/Legacy/SP/nistspecialpublication800-30r1.pdf"},
      {name:"FAIR Institute — Free Resources",           url:"https://www.fairinstitute.org/resources"},
      {name:"ENISA Threat Landscape 2024",               url:"https://www.enisa.europa.eu/publications/enisa-threat-landscape-2024"},
      {name:"ISACA Risk IT Framework",                   url:"https://www.isaca.org/resources/isaca-journal/issues/2009/volume-6/the-risk-it-framework"},
      {name:"NIST RMF Overview",                         url:"https://csrc.nist.gov/projects/risk-management/about-rmf"},
    ]
  },
  {
    num:"04", icon:"🔍", label:"Policies, Controls & Auditing",
    duration:"4–5 Weeks", cert:"CISA Prep",
    color:"#FF3E3E", glow:"0 0 22px rgba(255,62,62,.3)",
    topics:["Policy vs Standard vs Procedure","Control Types (Preventive / Detective / Corrective)",
            "Audit Lifecycle","Gap Analysis","GRC Tools: ServiceNow · OneTrust"],
    resources:[
      {name:"SANS Policy Templates — Free",              url:"https://www.sans.org/information-security-policy/"},
      {name:"CIS Controls v8 — Free PDF",                url:"https://www.cisecurity.org/controls/cis-controls-list"},
      {name:"IIA Internal Audit Standards",              url:"https://www.theiia.org/en/standards/"},
      {name:"ISACA COBIT 2019 Overview",                 url:"https://www.isaca.org/resources/cobit"},
      {name:"PCAOB Audit Standards",                     url:"https://pcaobus.org/standards/auditing"},
    ]
  },
  {
    num:"05", icon:"🚀", label:"Specialise & Job Hunt",
    duration:"Ongoing", cert:"CISM / CISSP / CySA+",
    color:"#00FF88", glow:"0 0 22px rgba(0,255,136,.35)",
    topics:["Build Risk Register Portfolio","Write Sample IS Policy",
            "Map Company to NIST CSF","Apply: Compliance / Risk Analyst","LinkedIn GRC Network"],
    resources:[
      {name:"NICE Cyber Career Pathways Tool",           url:"https://niccs.cisa.gov/workforce-development/cyber-career-pathways"},
      {name:"ISC2 Community — Free",                     url:"https://community.isc2.org"},
      {name:"r/cybersecurity — Career Megathread",       url:"https://www.reddit.com/r/cybersecurity"},
      {name:"LinkedIn GRC Jobs",                         url:"https://www.linkedin.com/jobs/governance-risk-compliance-jobs"},
      {name:"ISACA Job Board",                           url:"https://jobs.isaca.org"},
    ]
  },
];

const container = document.getElementById('roadmap');

phases.forEach((p, i) => {
  // wrapper
  const wrap = document.createElement('div');
  wrap.className = 'phase-wrap';

  // card
  const card = document.createElement('div');
  card.className = 'phase-card';
  card.style.setProperty('--accent', p.color);
  card.style.setProperty('--glow', p.glow);
  card.innerHTML = `
    <div class="badge" style="--accent:${p.color}">${p.num}</div>
    <div class="phase-info">
      <div class="phase-name">${p.icon} ${p.label}</div>
      <div class="phase-dur">⏱ ${p.duration}</div>
    </div>
    <div class="cert-tag" style="--accent:${p.color}">🏆 ${p.cert}</div>
    <div class="chevron">▼</div>
  `;

  // detail
  const detail = document.createElement('div');
  detail.className = 'detail';
  detail.style.setProperty('--accent', p.color);
  detail.innerHTML = `
    <div class="detail-label" style="color:${p.color}">WHAT TO LEARN</div>
    <div class="topics">
      ${p.topics.map(t=>`<span class="topic">• ${t}</span>`).join('')}
    </div>
    <div class="detail-label" style="color:#00D4FF">FREE RESOURCES</div>
    <div class="res-list">
      ${p.resources.map(r=>`
        <a class="res-link" href="${r.url}" target="_blank" rel="noreferrer">
          <span style="color:${p.color}">→</span>
          <span>${r.name}</span>
          <small>↗</small>
        </a>`).join('')}
    </div>
  `;

  // toggle
  card.addEventListener('click', () => {
    const isOpen = card.classList.contains('open');
    // close all
    document.querySelectorAll('.phase-card.open').forEach(c=>c.classList.remove('open'));
    document.querySelectorAll('.detail.open').forEach(d=>d.classList.remove('open'));
    if (!isOpen) {
      card.classList.add('open');
      detail.classList.add('open');
    }
  });

  wrap.appendChild(card);
  wrap.appendChild(detail);
  container.appendChild(wrap);

  // connector
  if (i < phases.length - 1) {
    const conn = document.createElement('div');
    conn.className = 'connector';
    conn.innerHTML = `<div class="conn-line"></div><div class="conn-arrow"></div>`;
    container.appendChild(conn);
  }
});
</script>
</body>
</html>
